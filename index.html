<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>newp space — Apps</title>
  <meta name="description" content="A collection of apps, tools, and games." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <header>
    <a class="logo" href="#">newp<span>.</span></a>
    <nav></nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-badge">⚡ Concept to development</div>
      <h1>Stop waiting.<br><span class="accent">Build your own.</span></h1>
      <p>If it doesn't exist, make it. A growing collection of apps, tools, and games built to solve real problems — no off-the-shelf compromise.</p>
    </section>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="web">Web Apps</button>
      <button class="filter-btn" data-filter="flutter">Flutter</button>
      <button class="filter-btn" data-filter="desktop">Desktop Apps</button>
    </div>

    <section class="grid-section">
      <div class="app-grid" id="app-grid">
        <!-- populated by main.js -->
      </div>
    </section>
  </main>

  <footer>
    newp space &nbsp;·&nbsp; ~ lost_
  </footer>

  <!-- Flutter launch modal -->
  <div id="app-modal" class="modal" role="dialog" aria-modal="true" aria-label="App launcher" hidden>
    <div class="modal-bar">
      <span id="modal-title" class="modal-title"></span>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <iframe id="modal-frame" class="modal-frame" title="App" allow="cross-origin-isolated"></iframe>
  </div>

  <script src="assets/main.js"></script>
</body>
</html>
